<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <Link rel="stylesheet" href="{{url_for('static', filename='css.main')}}"></Link>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <title>Sentiment Analysis</title>
</head>
<body>

    <div class="details">
        <div class="cotainer mt-5 mb-5">
            <div class="d-flex justify-content-center row">
                <div class="d-flex flex-column col-md-8">
                    <label for="">Positive Reviews: {{data.positive}}</label>
                    <label for="">Negetive Reviews: {{data.negetive}}</label>
                <div>
                    <form method="post">
                        <textarea name="text"></textarea>
                        <input type="submit">
                    </form>
                </div>
                
                <div class="coment-bottom bg-white p-2 px-4">
                        {% for review in data.reviews %}
                        <hr/>
                          <div
                              class="commented-section mt-2">
                              <div class="d-flex flex-row align-items-center commented-user">
                                  </div>
                                  <div class="text-nowrap bd-highlight"><span>{{ review }}</span></div>
                                  <hr/>
                        {% endfor %}


                </div>
            </div>
        </div>
    </div>

</body>
</html>
